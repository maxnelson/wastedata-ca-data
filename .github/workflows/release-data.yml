name: Release core data

on:
  push:
    branches: [main]
    paths:
      - 'data/processed/jurisdictions.json'
      - 'data/processed/by_jurisdiction.json'
      - 'data/processed/population.json'
      - 'data/processed/disposal/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package core data
        run: |
          tar -czf core-data.tar.gz \
            data/processed/jurisdictions.json \
            data/processed/population.json \
            data/processed/disposal/by_jurisdiction.json \
            data/processed/disposal/jurisdiction_county_map.json

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest processed core data
          body: Auto-updated on push to main
          files: core-data.tar.gz
