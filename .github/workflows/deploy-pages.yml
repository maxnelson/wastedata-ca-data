name: Deploy data to Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/processed/characterization/**'
      - 'data/processed/jurisdictions.json'
      - 'data/processed/population.json'
      - 'data/processed/disposal/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stage GitHub Pages content
        run: |
          mkdir -p _site/core/disposal
          cp data/processed/characterization/*.json _site/
          cp data/processed/jurisdictions.json _site/core/
          cp data/processed/population.json _site/core/
          cp data/processed/disposal/by_jurisdiction.json _site/core/disposal/
          cp data/processed/disposal/jurisdiction_county_map.json _site/core/disposal/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
